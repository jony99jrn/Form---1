<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verified Personal Information Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* লোডিং অ্যানিমেশন */
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full bg-[#1e293b] p-8 rounded-2xl shadow-2xl border border-slate-700">
        <div id="form-container">
            <h2 class="text-2xl font-bold mb-2 text-white">Personal Information</h2>
            <p class="text-slate-400 text-sm mb-6">অনুগ্রহ করে ওটিপি ভেরিফিকেশন সম্পন্ন করে তথ্য জমা দিন।</p>
            
            <!-- Hidden Iframe to prevent page redirect -->
            <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(submitted) { showSuccess(); }"></iframe>

            <form action="https://docs.google.com/forms/d/e/1FAIpQLScEMjVGw5cHwAHnC1jRe9nKC_tE9gwKG97vovFz5vw4f3pN0A/formResponse" 
                  method="POST" 
                  target="hidden_iframe"
                  onsubmit="return handleSubmit();">
                
                <!-- Your Name -->
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-1 text-slate-300">Your Name *</label>
                    <input type="text" name="entry.2013741161" required placeholder="Ex: Paul Somendra"
                        class="w-full px-4 py-2 bg-[#0f172a] border border-slate-600 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition duration-200">
                </div>

                <!-- Your Age -->
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-1 text-slate-300">Your Age *</label>
                    <input type="number" name="entry.2034806088" required placeholder="Ex: 20"
                        class="w-full px-4 py-2 bg-[#0f172a] border border-slate-600 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition duration-200">
                </div>

                <!-- Phone Number Section with OTP -->
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-1 text-slate-300">Your Phone Number📞 (With +880) *</label>
                    <div class="flex gap-2">
                        <input type="tel" id="phone-number" name="entry.1221844901" required placeholder="+8801XXXXXXXXX"
                            class="flex-1 px-4 py-2 bg-[#0f172a] border border-slate-600 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition duration-200">
                        <button type="button" onclick="sendOTP()" id="send-otp-btn" 
                            class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-4 py-2 rounded-lg text-xs transition duration-200 active:scale-95">
                            Send OTP
                        </button>
                    </div>
                    <!-- reCAPTCHA Container -->
                    <div id="recaptcha-container" class="mt-3 scale-90 origin-left"></div>
                </div>

                <!-- OTP Input Section (Initially Hidden) -->
                <div id="otp-section" class="mb-4 hidden">
                    <label class="block text-sm font-medium mb-1 text-green-400 font-bold">Enter 6-Digit Code *</label>
                    <div class="flex gap-2">
                        <input type="text" id="otp-code" placeholder="123456"
                            class="flex-1 px-4 py-2 bg-[#0f172a] border border-green-600 rounded-lg focus:ring-2 focus:ring-green-500 outline-none transition duration-200">
                        <button type="button" onclick="verifyOTP()" id="verify-btn"
                            class="bg-green-600 hover:bg-green-700 text-white font-bold px-4 py-2 rounded-lg text-xs transition duration-200 active:scale-95">
                            Verify
                        </button>
                    </div>
                </div>

                <!-- Email Address -->
                <div class="mb-6">
                    <label class="block text-sm font-medium mb-1 text-slate-300">Your Email Address ✉️ *</label>
                    <input type="email" name="entry.1412554393" required placeholder="example@mail.com"
                        class="w-full px-4 py-2 bg-[#0f172a] border border-slate-600 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition duration-200">
                </div>

                <!-- Main Submit Button -->
                <button type="submit" id="submit-btn" disabled
                    class="w-full bg-slate-700 text-slate-400 font-bold py-3 px-4 rounded-lg cursor-not-allowed transition duration-300 shadow-lg active:scale-95">
                    <span id="btn-text">Verify Phone to Submit</span>
                    <span id="btn-loader" class="hidden"><span class="loader"></span>Sending...</span>
                </button>
            </form>
        </div>

        <!-- Success Message (Initially Hidden) -->
        <div id="success-message" class="hidden text-center py-8">
            <div class="text-green-400 text-5xl mb-4">✔</div>
            <h2 class="text-2xl font-bold text-white mb-2">সফলভাবে জমা হয়েছে!</h2>
            <p class="text-slate-400">আপনার তথ্যগুলো আমাদের ডাটাবেজে সেভ করা হয়েছে।</p>
            <button onclick="location.reload()" class="mt-6 text-blue-400 hover:underline text-sm">আরেকটি সাবমিট করুন</button>
        </div>
    </div>

    <!-- Firebase SDK (Compat Version) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

    <script>
        // আপনার Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDFsiAfqYH6349X9TbtDBpqKUxDU8aZbPY",
            authDomain: "form---1.firebaseapp.com",
            projectId: "form---1",
            storageBucket: "form---1.firebasestorage.app",
            messagingSenderId: "349598656645",
            appId: "1:349598656645:web:4f480343f59cae575e61ec"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        
        var submitted = false;
        let confirmationResult;

        // ১. ওটিপি পাঠানোর ফাংশন
        function sendOTP() {
            const phoneNumber = document.getElementById('phone-number').value;
            
            if(!phoneNumber.startsWith('+88')) {
                alert("দয়া করে +880 সহ পুরো নম্বরটি লিখুন।");
                return;
            }

            // reCAPTCHA সেটআপ
            const appVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
                'size': 'normal'
            });

            auth.signInWithPhoneNumber(phoneNumber, appVerifier)
                .then((result) => {
                    confirmationResult = result;
                    document.getElementById('otp-section').classList.remove('hidden');
                    alert("আপনার মোবাইলে ওটিপি পাঠানো হয়েছে!");
                    document.getElementById('send-otp-btn').innerText = "Resend";
                }).catch((error) => {
                    alert("সমস্যা হয়েছে: " + error.message);
                    location.reload(); 
                });
        }

        // ২. ওটিপি যাচাই করার ফাংশন
        function verifyOTP() {
            const code = document.getElementById('otp-code').value;
            confirmationResult.confirm(code).then((result) => {
                alert("নম্বর সফলভাবে ভেরিফাই হয়েছে!");
                
                // সাবমিট বাটন এনাবল করা
                const submitBtn = document.getElementById('submit-btn');
                submitBtn.disabled = false;
                submitBtn.innerText = "Submit Data Now";
                submitBtn.classList.replace('bg-slate-700', 'bg-blue-600');
                submitBtn.classList.replace('text-slate-400', 'text-white');
                submitBtn.classList.remove('cursor-not-allowed');
                
                // ওটিপি সেকশন হাইড করে সাকসেস টেক্সট দেখানো
                document.getElementById('otp-section').innerHTML = "<p class='text-green-500 font-bold'>✅ Phone Verified</p>";
            }).catch((error) => {
                alert("ভুল ওটিপি কোড! আবার চেষ্টা করুন।");
            });
        }

        function handleSubmit() {
            document.getElementById('btn-text').classList.add('hidden');
            document.getElementById('btn-loader').classList.remove('hidden');
            document.getElementById('submit-btn').disabled = true;
            
            submitted = true;
            return true;
        }

        function showSuccess() {
            document.getElementById('form-container').classList.add('hidden');
            document.getElementById('success-message').classList.remove('hidden');
        }
    </script>
</body>
</html>
