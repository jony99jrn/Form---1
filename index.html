<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Information Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* লোডিং অ্যানিমেশন */
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full bg-[#1e293b] p-8 rounded-2xl shadow-2xl border border-slate-700">
        <div id="form-container">
            <h2 class="text-2xl font-bold mb-2 text-white">Personal Informations</h2>
            <p class="text-slate-400 text-sm mb-6">অনুগ্রহ করে নিচের তথ্যগুলো পূরণ করুন।</p>
            
            <!-- Hidden Iframe to prevent page redirect -->
            <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(submitted) { showSuccess(); }"></iframe>

            <form action="https://docs.google.com/forms/d/e/1FAIpQLScEMjVGw5cHwAHnC1jRe9nKC_tE9gwKG97vovFz5vw4f3pN0A/formResponse" 
                  method="POST" 
                  
                  onsubmit="return handleSubmit();">
                
                <!-- Your Name -->
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-1 text-slate-300">Your Name *</label>
                    <input type="text" name="entry.2013741161" required placeholder="Ex: DJ Alok"
                        class="w-full px-4 py-2 bg-[#0f172a] border border-slate-600 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition duration-200">
                </div>

                <!-- Your Age -->
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-1 text-slate-300">Your Age *</label>
                    <input type="number" name="entry.2034806088" required placeholder="Ex: 25"
                        class="w-full px-4 py-2 bg-[#0f172a] border border-slate-600 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition duration-200">
                </div>

                <!-- Phone Number -->
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-1 text-slate-300">Your Phone Number📞 *</label>
                    <input type="tel" name="entry.1221844901" required placeholder="017XXXXXXXX"
                        class="w-full px-4 py-2 bg-[#0f172a] border border-slate-600 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition duration-200">
                </div>

                <!-- Email Address -->
                <div class="mb-6">
                    <label class="block text-sm font-medium mb-1 text-slate-300">Your Email Address ✉️ *</label>
                    <input type="email" name="entry.1412554393" required placeholder="example@mail.com"
                        class="w-full px-4 py-2 bg-[#0f172a] border border-slate-600 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition duration-200">
                </div>

                <button type="submit" id="submit-btn"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-300 shadow-lg active:scale-95">
                    <span id="btn-text">Submit Data</span>
                    <span id="btn-loader" class="hidden"><span class="loader"></span>Sending...</span>
                </button>
            </form>
        </div>

        <!-- Success Message (Initially Hidden) -->
        <div id="success-message" class="hidden text-center py-8">
            <div class="text-green-400 text-5xl mb-4">✔</div>
            <h2 class="text-2xl font-bold text-white mb-2">সফলভাবে জমা হয়েছে!</h2>
            <p class="text-slate-400">আপনার তথ্যগুলো আমাদের ডাটাবেজে সেভ করা হয়েছে।</p>
            <button onclick="location.reload()" class="mt-6 text-blue-400 hover:underline text-sm">আরেকটি সাবমিট করুন</button>
        </div>
    </div>

    <script>
        var submitted = false;

        function handleSubmit() {
            // সাবমিট বাটন লোডিং স্টেট
            document.getElementById('btn-text').classList.add('hidden');
            document.getElementById('btn-loader').classList.remove('hidden');
            document.getElementById('submit-btn').disabled = true;
            
            submitted = true;
            return true;
        }

        function showSuccess() {
            // ফর্ম লুকিয়ে সাকসেস মেসেজ দেখানো
            document.getElementById('form-container').classList.add('hidden');
            document.getElementById('success-message').classList.remove('hidden');
        }
    </script>
</body>
</html>
